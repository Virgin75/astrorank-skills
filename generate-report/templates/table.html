<!--
  TABLE — rows of structured values, pure HTML+CSS.
  Item shape in data.json:
    { "name": "...", "how_to_get": "<tool + query>",
      "columns": "<comma-separated list of column descriptions>" }

  The agent fetches the real rows, then fills:
    {{NAME}}    -> .card-label
    one <th> per column (from the "columns" field, split on commas)
    one <tr><td>...</td></tr> per data row.

  Styling rules (already in base.html <style>, scoped to .rtable):
    - Header row: cyan text, uppercase, slightly translucent dark bg.
    - Body rows: striped (even rows subtly lighter).
    - Numeric cells: monospace, right-aligned, cyan-bright (.num class).
  A table is wide — it uses span-2.
-->
<div class="card span-2">
  <span class="card-label">Top pages by clicks</span>
  <div style="overflow-x:auto;">
    <table class="rtable">
      <thead>
        <tr>
          <th style="text-align:left;">Page</th>
          <th style="text-align:right;">Clicks</th>
          <th style="text-align:right;">Impressions</th>
          <th style="text-align:right;">CTR</th>
          <th style="text-align:left;">Trend</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="text-align:left;">/home</td>
          <td class="mono num">1&nbsp;284</td>
          <td class="mono num">42&nbsp;100</td>
          <td class="mono num">3.0%</td>
          <td style="text-align:left;color:#4ade80;">&uarr; 12%</td>
        </tr>
        <tr>
          <td style="text-align:left;">/blog/seo-guide</td>
          <td class="mono num">892</td>
          <td class="mono num">31&nbsp;500</td>
          <td class="mono num">2.8%</td>
          <td style="text-align:left;color:#4ade80;">&uarr; 8%</td>
        </tr>
        <tr>
          <td style="text-align:left;">/pricing</td>
          <td class="mono num">540</td>
          <td class="mono num">18&nbsp;900</td>
          <td class="mono num">2.9%</td>
          <td style="text-align:left;color:#f472b6;">&darr; 3%</td>
        </tr>
        <tr>
          <td style="text-align:left;">/docs/start</td>
          <td class="mono num">311</td>
          <td class="mono num">12&nbsp;400</td>
          <td class="mono num">2.5%</td>
          <td style="text-align:left;color:#94a3b8;">&ndash;</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
