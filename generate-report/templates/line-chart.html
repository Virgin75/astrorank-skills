<!--
  LINE CHART — trend over time, rendered by Chart.js via AstrorankCharts
  (defined in base.html). NO svg, NO manual point/area geometry.
  Item shape in data.json:
    { "name": "...", "how_to_get": "<tool + query>",
      "x_axis": "<time/category axis>", "y_axis": "<measured value>" }

  The agent fetches the real (x,y) series, then fills ONLY:
    {{NAME}}    -> .card-label text
    {{X_LABEL}} -> x-axis caption (from data.json x_axis)
    {{Y_LABEL}} -> y-axis caption (from data.json y_axis)
    {{LABELS}}  -> JS array of x values, e.g. ["Jul 1","Jul 8","Jul 15","Jul 24"]
    {{DATA}}    -> JS array of y numbers (same length), e.g. [420,510,740,980,1200]

  Canvas id MUST be unique across the whole report. A line chart is wide -> span-2.
-->
<div class="card span-2">
  <span class="card-label">Organic clicks — 30 days</span>
  <div class="chart-wrap">
    <canvas id="line1"></canvas>
  </div>
  <script>
    AstrorankCharts.line("line1", {
      xLabel: "Date",
      yLabel: "Clicks",
      labels: ["Jul 1", "Jul 8", "Jul 15", "Jul 24"],
      data:   [420, 510, 740, 1200]
    });
  </script>
</div>
