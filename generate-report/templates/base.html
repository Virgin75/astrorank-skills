<!--
  BASE DOCUMENT — the only HTML skeleton a report ever uses.
  Copy this file verbatim as the starting point. It contains:
    1. The FULL <style> block (shared retro-gaming theme) — the ONLY CSS.
    2. A <script src="chart.umd.min.js"> tag that loads Chart.js from a SIBLING
       file. When generating a report you copy BOTH this HTML and
       chart.umd.min.js into the report's output folder. The library is never
       inlined — base.html stays small and LLM-readable.
    3. The AstrorankCharts helper (bakes in the neon theme so each chart
       template only has to pass values: labels + data + captions).
    4. A single .report-grid container — paste rendered cards inside it.

  HARD RULES:
  - The <style> block is the ONLY CSS. Never add a second <style> tag.
  - Keep <script src="chart.umd.min.js"> as-is. Never inline the library, never
    open chart.umd.min.js, never change the src to a CDN or absolute URL.
  - The host iframe MUST allow scripts:
        <iframe sandbox="allow-scripts allow-same-origin">
    Charts are rendered by Chart.js into <canvas> elements via JS.
  - No <title>, no <h1> report heading, no intro/summary/footer sections.
    The <body> contains ONE element: the .report-grid with cards.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg:        #080d1a;
    --surface:   #0c1322;
    --surface-2: #0a1323;
    --cyan:      #22d3ee;
    --cyan-bright:#67e8f9;
    --cyan-deep: #06b6d4;
    --text:      #e2e8f0;
    --muted:     #94a3b8;
    --dim:       #64748b;
    --border:    rgba(255,255,255,0.06);
    --border-cyan: rgba(6,182,212,0.25);
    --grid-line: rgba(148,163,184,0.14);
    --c1:#22d3ee; --c2:#a78bfa; --c3:#f472b6; --c4:#4ade80; --c5:#fbbf24; --c6:#60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 1.25rem;
  }
  .mono {
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }
  .report-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1rem;
    align-items: start;
  }
  @media (min-width: 720px) {
    .report-grid { grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); }
    .span-2 { grid-column: span 2; }
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.15rem;
    box-shadow: 0 0 0 1px rgba(6,182,212,0.05), 0 8px 24px rgba(0,0,0,0.4);
  }
  .card-label {
    display: block;
    font-size: 0.66rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cyan);
    margin-bottom: 0.85rem;
    text-shadow: 0 0 10px rgba(34,211,238,0.35);
  }
  /* chart canvas wrapper — fixed height, full width, Chart.js fills it */
  .chart-wrap {
    position: relative;
    width: 100%;
    height: 260px;
  }

  /* table (used by templates/table.html) */
  .rtable { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .rtable th {
    font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--cyan);
    background: rgba(6,182,212,0.07);
    padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--border-cyan);
    text-align: right;
  }
  .rtable td {
    padding: 0.5rem 0.7rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    text-align: right;
  }
  .rtable tbody tr:nth-child(even) { background: rgba(255,255,255,0.018); }
  .rtable tbody tr:hover { background: rgba(6,182,212,0.05); }
  .rtable .num { color: var(--cyan-bright); }
</style>

<!-- Chart.js v4.4.3 — loaded from a sibling file. The skill copies
     chart.umd.min.js into the report's output folder alongside this HTML. -->
<script src="chart.umd.min.js"></script>

<!-- ============ AstrorankCharts helper (project theme baked in) ============ -->
<!-- Each chart template just calls one of these with values; styling is fixed. -->
<script>
(function () {
  var PALETTE = ['#22d3ee', '#a78bfa', '#f472b6', '#4ade80', '#fbbf24', '#60a5fa'];
  var TEXT = '#e2e8f0', MUTED = '#94a3b8', DIM = '#64748b';
  var GRID = 'rgba(148,163,184,0.14)';
  var SURFACE = '#0c1322';
  var FONT = "ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace";

  function initDefaults() {
    var d = window.Chart.defaults;
    d.color = MUTED;
    d.borderColor = GRID;
    d.font.family = FONT;
    d.font.size = 11;
    var tt = d.plugins.tooltip;
    tt.backgroundColor = 'rgba(12,19,34,0.96)';
    tt.titleColor = '#67e8f9';
    tt.bodyColor = TEXT;
    tt.borderColor = 'rgba(6,182,212,0.45)';
    tt.borderWidth = 1;
    tt.padding = 8;
    tt.titleFont = { family: FONT, weight: '700', size: 11 };
    tt.bodyFont = { family: FONT, size: 11 };
    tt.displayColors = false;
    d.plugins.legend.labels.color = MUTED;
    d.plugins.legend.labels.font = { family: FONT, size: 11 };
  }

  // vertical gradient fill, lazily computed once the chart area exists
  function vGradient(c1, c2) {
    return function (ctx) {
      var chart = ctx.chart, area = chart.chartArea;
      if (!area) return c1;
      var g = chart.ctx.createLinearGradient(0, area.bottom, 0, area.top);
      g.addColorStop(0, c2);
      g.addColorStop(1, c1);
      return g;
    };
  }

  function axis(title) {
    return {
      title: { display: !!title, text: title, color: DIM,
               font: { family: FONT, size: 10 } },
      grid: { color: GRID, tickColor: GRID },
      border: { color: GRID },
      ticks: { color: MUTED, font: { family: FONT, size: 10 } }
    };
  }

  function common() {
    return {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 350 },
      plugins: { legend: { display: false } }
    };
  }

  // center-text plugin for the doughnut total
  var centerText = {
    id: 'arCenterText',
    afterDraw: function (chart) {
      var opt = chart.options.plugins.arCenterText || {};
      if (!opt.display) return;
      var ctx = chart.ctx, area = chart.chartArea;
      var cx = (area.left + area.right) / 2, cy = (area.top + area.bottom) / 2;
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffffff';
      ctx.font = "800 20px " + FONT;
      ctx.shadowColor = 'rgba(103,232,249,0.55)'; ctx.shadowBlur = 14;
      ctx.fillText(opt.text, cx, cy - 8);
      ctx.shadowBlur = 0;
      ctx.fillStyle = MUTED;
      ctx.font = "10px " + FONT;
      ctx.fillText(opt.sub || '', cx, cy + 12);
      ctx.restore();
    }
  };

  function fmt(n) {
    if (n === null || n === undefined || isNaN(n)) return '';
    var abs = Math.abs(n);
    if (abs >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    if (abs >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'k';
    return String(n);
  }

  var A = window.AstrorankCharts = {
    PALETTE: PALETTE,
    // Bar chart. opts: {labels:[..], data:[..], xLabel, yLabel, prefix, suffix}
    bar: function (canvasId, opts) {
      opts = opts || {};
      var el = document.getElementById(canvasId);
      if (!el) return null;
      return new window.Chart(el, {
        type: 'bar',
        data: {
          labels: opts.labels,
          datasets: [{
            data: opts.data,
            backgroundColor: vGradient('#67e8f9', '#0891b2'),
            hoverBackgroundColor: vGradient('#a5f3fc', '#22d3ee'),
            borderRadius: 4,
            borderSkipped: false,
            borderWidth: 0,
            barPercentage: 0.6,
            categoryPercentage: 0.7
          }]
        },
        options: Object.assign(common(), {
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (c) {
              return (opts.prefix || '') + fmt(c.parsed.y) + (opts.suffix || ''); } } }
          },
          scales: { x: axis(opts.xLabel), y: Object.assign(axis(opts.yLabel), { beginAtZero: true }) }
        })
      });
    },
    // Line chart. opts: {labels:[..], data:[..], xLabel, yLabel, prefix, suffix}
    line: function (canvasId, opts) {
      opts = opts || {};
      var el = document.getElementById(canvasId);
      if (!el) return null;
      return new window.Chart(el, {
        type: 'line',
        data: {
          labels: opts.labels,
          datasets: [{
            data: opts.data,
            borderColor: '#22d3ee',
            borderWidth: 2.4,
            tension: 0.35,
            fill: true,
            backgroundColor: vGradient('rgba(34,211,238,0.35)', 'rgba(34,211,238,0)'),
            pointRadius: 3,
            pointHoverRadius: 5,
            pointBackgroundColor: '#67e8f9',
            pointBorderColor: '#67e8f9'
          }]
        },
        options: Object.assign(common(), {
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (c) {
              return (opts.prefix || '') + fmt(c.parsed.y) + (opts.suffix || ''); } } }
          },
          scales: { x: axis(opts.xLabel), y: Object.assign(axis(opts.yLabel), { beginAtZero: true }) }
        })
      });
    },
    // Doughnut chart. opts: {labels:[..], data:[..], totalText, totalSub}
    doughnut: function (canvasId, opts) {
      opts = opts || {};
      var el = document.getElementById(canvasId);
      if (!el) return null;
      return new window.Chart(el, {
        type: 'doughnut',
        data: {
          labels: opts.labels,
          datasets: [{
            data: opts.data,
            backgroundColor: PALETTE,
            borderColor: SURFACE,
            borderWidth: 3,
            hoverOffset: 6
          }]
        },
        options: Object.assign(common(), {
          cutout: '62%',
          plugins: {
            legend: {
              display: true, position: 'right',
              labels: { color: TEXT, boxWidth: 12, boxHeight: 12, padding: 10 }
            },
            arCenterText: {
              display: !!opts.totalText, text: opts.totalText || '', sub: opts.totalSub || ''
            },
            tooltip: { callbacks: { label: function (c) {
              var tot = c.dataset.data.reduce(function (a, b) { return a + b; }, 0);
              var pct = tot ? Math.round(c.parsed / tot * 100) : 0;
              return c.label + ': ' + fmt(c.parsed) + ' (' + pct + '%)'; } } }
          }
        }),
        plugins: [centerText]
      });
    }
  };

  if (window.Chart) initDefaults();
})();
</script>
<!-- ============ END AstrorankCharts helper ============ -->
</head>
<body>
  <!--
    PASTE RENDERED CARDS HERE.
    One .card per item in data.json, in data.json order:
    metrics -> bar_charts -> pie_charts -> line_charts -> table.
    Metrics use class "card"; wider charts (bar/line/table) add "span-2".
  -->
  <div class="report-grid">

    <!-- example metric card (replace / remove) =========================== -->
    <div class="card">
      <span class="card-label">Organic clicks</span>
      <!-- metric body — see templates/metric.html -->
    </div>

    <!-- example bar chart (replace / remove) ============================= -->
    <div class="card span-2">
      <span class="card-label">Clicks by page</span>
      <!-- bar chart body — see templates/bar-chart.html -->
    </div>

  </div>
</body>
</html>
