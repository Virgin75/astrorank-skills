<!--
  BAR CHART — vertical bars, rendered by Chart.js via the AstrorankCharts
  helper (defined in base.html). NO svg, NO manual geometry math.
  Item shape in data.json:
    { "name": "...", "how_to_get": "<tool + query>",
      "x_axis": "<what categories are>", "y_axis": "<what the bar height is>" }

  The agent fetches the real category/value pairs, then fills ONLY:
    {{NAME}}    -> .card-label text
    {{X_LABEL}} -> x-axis caption (from data.json x_axis)
    {{Y_LABEL}} -> y-axis caption (from data.json y_axis)
    {{LABELS}}  -> JS array of category strings, e.g. ["Home","Blog","Docs"]
    {{DATA}}    -> JS array of numbers (same length), e.g. [520,360,150]

  Canvas id MUST be unique across the whole report. Use a descriptive id and
  if a second bar chart is needed, give it a different id (e.g. "bar2").
  A bar chart is wide -> it uses span-2.
-->
<div class="card span-2">
  <span class="card-label">Clicks by page</span>
  <div class="chart-wrap">
    <canvas id="bar1"></canvas>
  </div>
  <script>
    AstrorankCharts.bar("bar1", {
      xLabel: "Page",
      yLabel: "Clicks",
      labels: ["Home", "Blog", "Pricing", "Docs"],
      data:   [520, 360, 240, 150]
    });
  </script>
</div>
