<!--
  PIE / DOUGHNUT CHART — rendered by Chart.js via AstrorankCharts
  (defined in base.html). NO svg arc math, NO dasharray offsets.
  Item shape in data.json:
    { "name": "...", "how_to_get": "<tool + query>",
      "labels": "<what segments represent>", "values": "<what slice size is>" }

  The agent fetches the real label/value pairs, then fills ONLY:
    {{NAME}}       -> .card-label text
    {{LABELS}}     -> JS array of segment names, e.g. ["Organic","Paid","Referral"]
    {{DATA}}       -> JS array of numbers (same length), e.g. [1760,1050,590]
    {{TOTAL_TEXT}} -> center big number (sum, formatted), e.g. "3.4k"
    {{TOTAL_SUB}}  -> center caption, e.g. "total"

  Colors come from the project palette automatically (cyan, purple, pink,
  green, amber, blue) in order. Canvas id MUST be unique across the report.
  A pie chart does NOT need span-2.
-->
<div class="card">
  <span class="card-label">Traffic by source</span>
  <div class="chart-wrap">
    <canvas id="pie1"></canvas>
  </div>
  <script>
    AstrorankCharts.doughnut("pie1", {
      labels:     ["Organic", "Paid", "Referral"],
      data:       [1760, 1050, 590],
      totalText:  "3.4k",
      totalSub:   "total"
    });
  </script>
</div>
